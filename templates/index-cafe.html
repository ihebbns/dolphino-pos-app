</style>
</head>

  ]}
};

// ═══════════════ STATE ═══════════════
const USERS = {
  manager:{pin:CLIENT_CONFIG.managerPin,name:CLIENT_CONFIG.managerName,role:'Manager',isManager:true},
  caissier:{pin:CLIENT_CONFIG.cashierPin,name:CLIENT_CONFIG.cashierName,role:'Caissier',isManager:false}
};

let currentUser = null;
let tables = []; // Array of { id, items:[], total, openedAt, status:'free'|'occupied' }
let activeTable = null; // currently selected table index
let cat = Object.keys(MENU)[0];
let orderNum = 1;
const TABLES_KEY = 'cafe-tables-v1';
const STATE_KEY = 'cafe-state-v1';

// Initialize tables
function initTables() {
  const saved = localStorage.getItem(TABLES_KEY);
  if (saved) {
    try { tables = JSON.parse(saved); return; } catch(e) {}
  }
  tables = [];
  for (let i = 0; i < CLIENT_CONFIG.tableCount; i++) {
    tables.push({ id: i+1, items: [], total: 0, openedAt: null, status: 'free' });
  }
}
initTables();

function saveTables() {
  localStorage.setItem(TABLES_KEY, JSON.stringify(tables));
}

function f(n) { return Number(n).toFixed(3); }
function now() { return new Date().toLocaleTimeString('fr-TN', {hour:'2-digit',minute:'2-digit'}); }
function todayKey() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ═══════════════ RENDER ENGINE ═══════════════
const $ = (id) => document.getElementById(id);
const app = $('app');

function render() {
  if (!currentUser) { renderLogin(); return; }
  if (activeTable === null) { renderTables(); return; }
  renderTableOrder();
}

// ═══════════════ LOGIN SCREEN ═══════════════
let pinBuffer = '';
let pinTarget = null;

function renderLogin() {
  app.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,rgba(200,145,58,.08),transparent 55%),var(--bg);">
    <div style="background:var(--panel);border:1px solid var(--div);border-radius:20px;padding:38px 32px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);">
      <div style="font-size:46px;margin-bottom:4px;">${CLIENT_CONFIG.logo}</div>
      <div style="font-family:'Playfair Display',serif;font-size:27px;color:var(--gold-l);letter-spacing:2px;">${CLIENT_CONFIG.name}</div>
      <div style="font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:30px;">${CLIENT_CONFIG.tagline}</div>
      <div id="user-cards" style="display:flex;flex-direction:column;gap:10px;">
        <div onclick="selectUser('manager')" style="background:var(--card);border:2px solid var(--div);border-radius:12px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .18s;">
          <div style="width:44px;height:44px;border-radius:50%;background:rgba(200,145,58,.2);color:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;">${USERS.manager.name.charAt(0)}</div>
          <div><div style="font-size:15px;font-weight:600;">${USERS.manager.name}</div><div style="font-size:11px;color:var(--muted);">Accès complet</div></div>
        </div>
        <div onclick="selectUser('caissier')" style="background:var(--card);border:2px solid var(--div);border-radius:12px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .18s;">
          <div style="width:44px;height:44px;border-radius:50%;background:rgba(74,144,217,.2);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;">${USERS.caissier.name.charAt(0)}</div>
          <div><div style="font-size:15px;font-weight:600;">${USERS.caissier.name}</div><div style="font-size:11px;color:var(--muted);">Vente · Service</div></div>
        </div>
      </div>
      <div id="pin-area" style="display:none;margin-top:16px;">
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">Code PIN</div>
        <div id="pin-dots" style="display:flex;gap:10px;justify-content:center;margin-bottom:14px;"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          ${[1,2,3,4,5,6,7,8,9,'✕',0,'⌫'].map(k => `<div onclick="pinKey('${k}')" style="padding:14px;background:var(--card);border:1px solid var(--div);border-radius:8px;color:${k==='✕'?'var(--red)':k==='⌫'?'var(--muted)':'var(--txt)'};font-size:18px;font-weight:600;cursor:pointer;text-align:center;">${k}</div>`).join('')}
        </div>
        <div id="pin-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none;">Code incorrect</div>
        <div onclick="pinTarget=null;pinBuffer='';render()" style="color:var(--muted);font-size:12px;cursor:pointer;margin-top:14px;">← Changer</div>
      </div>
    </div>
  </div>`;
}

function selectUser(role) {
  pinTarget = role;
  pinBuffer = '';
  renderLogin();
  $('user-cards').style.display = 'none';
  $('pin-area').style.display = 'block';
  renderPinDots();
}

function renderPinDots() {
  $('pin-dots').innerHTML = [0,1,2,3].map(i => `<div style="width:14px;height:14px;border-radius:50%;border:2px solid ${i<pinBuffer.length?'var(--gold)':'var(--div)'};background:${i<pinBuffer.length?'var(--gold)':'transparent'};transition:all .15s;"></div>`).join('');
}

function pinKey(k) {
  if (k === '✕') { pinBuffer = ''; renderPinDots(); return; }
  if (k === '⌫') { pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); return; }
  pinBuffer += k;
  renderPinDots();
  if (pinBuffer.length === 4) {
    if (USERS[pinTarget] && USERS[pinTarget].pin === pinBuffer) {
      currentUser = pinTarget;
      activeTable = null;
      render();
    } else {
      $('pin-error').style.display = 'block';
      pinBuffer = '';
      setTimeout(() => { $('pin-error').style.display='none'; renderPinDots(); }, 1200);
    }
  }
}

            <div style="font-size:15px;font-weight:700;">Table ${t.id}</div>
            ${t.status==='occupied'?`
              <div style="font-size:11px;color:var(--muted);margin-top:4px;">${t.items.length} article${t.items.length>1?'s':''} · ${t.openedAt||''}</div>
              <div style="font-size:16px;font-weight:700;color:var(--gold-l);margin-top:6px;">${f(t.total)} ${CLIENT_CONFIG.currency}</div>
            `:`<div style="font-size:11px;color:var(--muted);margin-top:4px;">Libre</div>`}
          </div>
        `).join('')}
      </div>
    </div>
  </div>
  <style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}</style>`;
  startClock();
}

function openTable(idx) { activeTable = idx; render(); }
function logout() { currentUser = null; activeTable = null; render(); }

// ═══════════════ TABLE ACTIONS ═══════════════
function setCat(c) { cat = c; render(); }

function addToTable(item) {
  const t = tables[activeTable];
  if (t.status === 'free') {
    t.status = 'occupied';
    t.openedAt = now();
  }
  // Check if item already exists → increment qty
  const existing = t.items.find(x => x.id === item.id);
  if (existing) {
    existing.qty++;
  } else {
    t.items.push({ id: item.id, name: item.name, e: item.e, price: item.p || (item.v?item.v[0].p:0), qty: 1 });
  }
  recalcTable(activeTable);
  saveTables();
  render();
}

function changeQty(idx, delta) {
  const t = tables[activeTable];
  t.items[idx].qty = Math.max(1, t.items[idx].qty + delta);
  recalcTable(activeTable);
  saveTables();
  render();
}

function removeItem(idx) {
  const t = tables[activeTable];
  t.items.splice(idx, 1);
  if (t.items.length === 0) { t.status = 'free'; t.openedAt = null; }
  recalcTable(activeTable);
  saveTables();
  render();
}

function clearTable() {
  if (!confirm('Vider la table ' + tables[activeTable].id + ' ?')) return;
  tables[activeTable].items = [];
  tables[activeTable].total = 0;
  tables[activeTable].status = 'free';
  tables[activeTable].openedAt = null;
  saveTables();
  render();
}

function recalcTable(idx) {
  tables[idx].total = tables[idx].items.reduce((s, it) => s + it.price * it.qty, 0);
}

function backToTables() { activeTable = null; render(); }

// ═══════════════ SETTLE / PAY ═══════════════
function settleTable() {
  const t = tables[activeTable];
  if (t.items.length === 0) return;

  const confirmed = confirm(`Encaisser Table ${t.id} — ${f(t.total)} ${CLIENT_CONFIG.currency} ?\n\nCliquez OK pour confirmer le paiement.`);
  if (!confirmed) return;

  // Save sale to SQLite (if available)
  const saleData = {
    num: orderNum++,
    businessDate: todayKey(),
    date: new Date().toLocaleDateString('fr-TN'),
    time: now(),
    items: t.items.map(it => ({ name: it.name, qty: it.qty, price: it.price })),
    s: t.total,
    d: 0,
    disc: 0,
    g: t.total,
    payMode: 'cash',
    r: t.total,
    monnaie: 0,
    cashier: USERS[currentUser]?.name || 'Caissier',
    type: 'table',
    cliName: 'Table ' + t.id,
    cliTel: '',
  };

  // Save to SQLite via IPC
  if (window.electronAPI?.saveSale) {
    window.electronAPI.saveSale(saleData);
  }

  // Sync to server
  syncSale(saleData);

  // Print if enabled
  if (CLIENT_CONFIG.printEnabled) {
    printReceipt(t, saleData);
  }

  // Clear table
  t.items = [];
  t.total = 0;
  t.status = 'free';
  t.openedAt = null;
  saveTables();
  activeTable = null;
  render();
  flash('✅ Table ' + t.id + ' encaissée — ' + f(saleData.g) + ' ' + CLIENT_CONFIG.currency);
}

// ═══════════════ SYNC ═══════════════
let syncQueue = JSON.parse(localStorage.getItem('cafe-sync-queue') || '[]');
function saveQueue() { localStorage.setItem('cafe-sync-queue', JSON.stringify(syncQueue)); }

async function syncSale(od) {
  if (!SYNC_ENABLED) return;
  try {
    const res = await fetch(SYNC_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': SYNC_API_KEY },
      body: JSON.stringify(od)
    });
    const data = await res.json();
    if (data.ok) { flushQueue(); return true; }
  } catch(e) {
    syncQueue.push(od); saveQueue();
  }
  return false;
}

async function flushQueue() {
  if (!syncQueue.length) return;
  const remaining = [];
  for (const od of syncQueue) {
    try {
      const res = await fetch(SYNC_API_URL, { method:'POST', headers:{'Content-Type':'application/json','X-Api-Key':SYNC_API_KEY}, body:JSON.stringify(od) });
      const data = await res.json();
      if (!data.ok) remaining.push(od);
    } catch(e) { remaining.push(od); }
  }
  syncQueue = remaining; saveQueue();
}
window.addEventListener('online', () => { flushQueue(); });

// ═══════════════ LICENSE CHECK ═══════════════
const CHECK_URL = SYNC_API_URL.replace('/api/sync', '/api/check');
async function checkLicense() {
  if (!SYNC_ENABLED) return;
  try {
    const res = await fetch(CHECK_URL + '?key=' + SYNC_API_KEY, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (data.ok && data.active === false) {
      app.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);">
        <div style="background:var(--panel);border:1px solid rgba(224,82,82,.4);border-radius:20px;padding:40px 32px;width:380px;text-align:center;">
          <div style="font-size:56px;margin-bottom:12px;">🔒</div>
          <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--red);margin-bottom:14px;">Application Suspendue</div>
          <div style="font-size:14px;color:var(--muted);line-height:1.8;white-space:pre-line;">${data.message||'Contactez le développeur.'}</div>
        </div></div>`;
    }
  } catch(e) { /* offline — don't block */ }
}
setTimeout(checkLicense, 5000);
setInterval(checkLicense, 30 * 60 * 1000);

// ═══════════════ THEME ═══════════════
function toggleTheme() {
  const isLight = document.body.classList.contains('light');
  document.body.classList.toggle('light', !isLight);
  localStorage.setItem('cafe-theme', isLight ? 'dark' : 'light');
}
(function(){ const t = localStorage.getItem('cafe-theme'); if(t==='light') document.body.classList.add('light'); })();

// ═══════════════ CLOCK ═══════════════
function startClock() {
  const el = document.getElementById('clock-main');
  if (el) el.textContent = new Date().toLocaleTimeString('fr-TN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setTimeout(startClock, 1000);
}

// ═══════════════ FLASH MESSAGE ═══════════════
function flash(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:10px 20px;color:var(--gold-l);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4);';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ═══════════════ START ═══════════════
render();

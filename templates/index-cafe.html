<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Pro — Café & Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0704;--panel:#0F0C08;--card:#161210;--card-h:#1E1810;
  --gold:#C8913A;--gold-l:#E8A84C;--gold-dim:rgba(200,145,58,.1);
  --txt:#F0E8D8;--muted:#7A6E5F;--div:#231C12;
  --green:#3DB87A;--red:#E05252;--blue:#4A90D9;--orange:#E8882A;--purple:#9B6FD4;
  --r:8px;--shadow:0 4px 16px rgba(0,0,0,.3);
}
body.light{
  --bg:#F5F0E8;--panel:#FFFFFF;--card:#F0EBE0;--card-h:#E8E0D0;
  --gold:#B8782A;--gold-l:#A06820;--gold-dim:rgba(184,120,42,.08);
  --txt:#1A1208;--muted:#8A7A6A;--div:#DDD5C5;
  --green:#2A8A5A;--red:#C04040;--blue:#2A70B8;--orange:#C06818;--purple:#7B4FB0;
  --shadow:0 4px 16px rgba(0,0,0,.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;font-size:13px;display:flex;flex-direction:column}
input,textarea,select,button{font-family:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--div);border-radius:4px}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border-bottom:1px solid var(--div);padding:0 16px;height:50px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo-circle{width:32px;height:32px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--gold)}
.logo-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold-l)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
#clock{font-size:18px;font-weight:600}
#clock-date{font-size:10px;color:var(--muted);text-align:center}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--card);border:1px solid var(--div);border-radius:6px;padding:6px 12px;color:var(--muted);font-size:11px;font-weight:600;transition:all .12s}
.hdr-btn:hover{border-color:var(--gold);color:var(--gold-l)}
.hdr-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.hdr-badge-green{background:rgba(61,184,122,.12);border:1px solid rgba(61,184,122,.3);color:var(--green)}
.hdr-badge-red{background:rgba(224,82,82,.12);border:1px solid rgba(224,82,82,.3);color:var(--red)}

/* ── MAIN LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── TABLE PLAN (left) ── */
#table-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.section-tabs{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--div);background:var(--panel);flex-shrink:0}
.section-tab{padding:7px 16px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);border:1px solid transparent;transition:all .12s}
.section-tab:hover{color:var(--txt);background:var(--card)}
.section-tab.on{background:var(--gold-dim);border-color:rgba(200,145,58,.3);color:var(--gold-l)}
#table-grid{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;align-content:start}

/* ── TABLE CARD ── */
.tbl{position:relative;border-radius:14px;padding:20px 16px;text-align:center;border:2px solid var(--div);background:var(--card);transition:all .15s;cursor:pointer;animation:slideUp .3s ease both;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tbl:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.tbl-free{border-color:var(--div);opacity:.7}
.tbl-free:hover{opacity:1;border-color:var(--gold-dim)}
.tbl-occupied{border-color:var(--gold);background:linear-gradient(135deg,rgba(200,145,58,.06),var(--card))}
.tbl-sent{border-color:var(--green);background:linear-gradient(135deg,rgba(61,184,122,.06),var(--card))}
.tbl-bill{border-color:var(--orange);background:linear-gradient(135deg,rgba(232,136,42,.06),var(--card))}
.tbl-clean{border-color:var(--purple);background:linear-gradient(135deg,rgba(155,111,212,.06),var(--card))}
.tbl-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
.tbl-dot-gold{background:var(--gold);animation:pulse 2s infinite}
.tbl-dot-green{background:var(--green);animation:pulse 2s infinite}
.tbl-dot-orange{background:var(--orange);animation:pulse 2s infinite}
.tbl-dot-purple{background:var(--purple)}
.tbl-icon{font-size:32px;margin-bottom:6px}
.tbl-num{font-size:16px;font-weight:700}
.tbl-info{font-size:11px;color:var(--muted);margin-top:4px}
.tbl-total{font-size:17px;font-weight:700;color:var(--gold-l);margin-top:6px}
.tbl-timer{font-size:10px;color:var(--muted);margin-top:3px}
.tbl-server{font-size:9px;color:var(--blue);margin-top:2px}

/* ── ORDER PANEL (right) ── */
#order-panel{width:380px;background:var(--panel);border-left:1px solid var(--div);display:flex;flex-direction:column;flex-shrink:0}
.op-hdr{padding:10px 14px;border-bottom:1px solid var(--div);display:flex;align-items:center;justify-content:space-between}
.op-title{font-weight:700;font-size:14px}
.op-table{font-size:20px;color:var(--gold);font-weight:700}
.op-actions{display:flex;gap:6px}
.op-btn{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid var(--div);background:var(--card);color:var(--muted);transition:all .12s}
.op-btn:hover{border-color:var(--gold);color:var(--gold-l)}
.op-btn-red{border-color:rgba(224,82,82,.3);color:var(--red)}
.op-btn-red:hover{background:rgba(224,82,82,.08)}

/* Category strip */
.cat-strip{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--div);overflow-x:auto;flex-shrink:0}
.cat-chip{padding:6px 12px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--div);color:var(--muted);transition:all .12s}
.cat-chip:hover{border-color:var(--gold-dim);color:var(--txt)}
.cat-chip.on{border-color:var(--gold);color:var(--gold-l);background:var(--gold-dim)}

/* Product grid inside order panel */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 10px;overflow-y:auto;max-height:220px}
.prod-card{background:var(--card);border:1px solid var(--div);border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .12s;font-size:11px}
.prod-card:hover{border-color:var(--gold);background:var(--card-h)}
.prod-card:active{transform:scale(.96)}
.prod-em{font-size:18px}
.prod-nm{font-size:10px;font-weight:500;margin-top:2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-pr{font-size:11px;font-weight:700;color:var(--gold-l);margin-top:2px}

/* Order items list */
#order-items{flex:1;overflow-y:auto;border-top:1px solid var(--div)}
.oi{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid rgba(35,28,18,.5);animation:slideUp .2s ease}
.oi:hover{background:var(--card)}
.oi-qty{display:flex;align-items:center;background:var(--card);border:1px solid var(--div);border-radius:4px;overflow:hidden}
.oi-qb{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);border:none;background:none}
.oi-qb:hover{background:var(--div);color:var(--txt)}
.oi-qv{width:20px;text-align:center;font-size:11px;font-weight:700}
.oi-info{flex:1;min-width:0}
.oi-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oi-mods{font-size:9px;color:var(--orange);margin-top:1px}
.oi-note{font-size:9px;color:var(--muted);font-style:italic}
.oi-price{font-size:12px;font-weight:700;color:var(--gold-l);flex-shrink:0}
.oi-del{color:var(--muted);font-size:12px;padding:3px;flex-shrink:0}
.oi-del:hover{color:var(--red)}

/* Totals + payment */
#order-footer{border-top:1px solid var(--div);padding:10px 14px}
.total-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}
.total-grand{display:flex;justify-content:space-between;font-size:18px;font-weight:700;padding-top:6px;border-top:1px solid var(--div);margin-top:4px}
.total-grand span:last-child{color:var(--gold-l)}
.pay-btns{display:flex;gap:6px;margin-top:10px}
.pay-btn{flex:1;padding:10px 4px;border-radius:7px;font-size:12px;font-weight:700;text-align:center;border:none;transition:all .12s}
.pay-btn-green{background:linear-gradient(135deg,var(--green),#2ea868);color:#fff}
.pay-btn-green:hover{opacity:.9;transform:translateY(-1px)}
.pay-btn-green:disabled{opacity:.35;cursor:not-allowed;transform:none}
.pay-btn-orange{background:var(--card);border:1px solid var(--div);color:var(--muted)}
.pay-btn-orange:hover{border-color:var(--orange);color:var(--orange)}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fadeIn .15s}
.modal-bg.show{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--div);border-radius:16px;padding:24px;width:90vw;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5);animation:scaleIn .2s cubic-bezier(.2,.85,.3,1.1)}
.modal-box-wide{max-width:700px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center}
.modal-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px}
.modal-close{width:100%;padding:10px;background:var(--card);border:1px solid var(--div);border-radius:7px;color:var(--muted);font-size:13px;margin-top:12px}
.modal-close:hover{border-color:var(--red);color:var(--red)}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(200,145,58,.08),transparent 55%),var(--bg);z-index:900;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--panel);border:1px solid var(--div);border-radius:20px;padding:36px 30px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:scaleIn .35s cubic-bezier(.2,.9,.3,1.1)}
.login-logo{font-size:44px;margin-bottom:4px}
.login-brand{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold-l);letter-spacing:2px}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:24px}
.user-card{background:var(--card);border:2px solid var(--div);border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;margin-bottom:8px}
.user-card:hover{border-color:var(--gold);background:var(--card-h);transform:translateY(-1px)}
.user-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.user-name{font-size:14px;font-weight:600}
.user-role{font-size:10px;color:var(--muted);margin-top:1px}
.pin-wrap{margin-top:16px;display:none}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--div);transition:all .12s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pin-btn{padding:13px;background:var(--card);border:1px solid var(--div);border-radius:7px;color:var(--txt);font-size:17px;font-weight:600;text-align:center;transition:all .1s}
.pin-btn:hover{background:var(--card-h);border-color:var(--gold-dim)}
.pin-btn:active{transform:scale(.95)}
.pin-error{color:var(--red);font-size:11px;margin-top:8px;display:none}

/* ── SESSION CAISSE ── */
.session-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.session-box{background:var(--panel);border:1px solid var(--div);border-radius:18px;padding:30px;width:360px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.6)}

/* ── REMOTE LOCK ── */
#remote-lock{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,rgba(224,82,82,.1),transparent 60%),var(--bg);z-index:999;display:none;align-items:center;justify-content:center}
#remote-lock.active{display:flex}
.lock-box{background:var(--panel);border:1px solid rgba(224,82,82,.4);border-radius:18px;padding:36px 28px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}

/* ── FLASH TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:10px 20px;color:var(--gold-l);font-size:12px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slideUp .3s ease}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);padding:30px;text-align:center}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:8px}

/* ── STATUS BAR ── */
#statusbar{background:var(--panel);border-top:1px solid var(--div);padding:3px 16px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted);flex-shrink:0}

/* ── PRINT ── */
@media print{body>*{display:none!important}#print-zone{display:block!important}}
#print-zone{display:none}
</style>
</head>

<div id="login"></div>
<header id="hdr" style="display:none"></header>
<div id="main" style="display:none"></div>
<div id="statusbar" style="display:none"><span id="status-msg">✓ Prêt</span><span id="status-sync"></span></div>

// ═══════════════ INIT TABLES ═══════════════
function initTables() {
  const saved = localStorage.getItem(STORE.tables);
  if (saved) { try { tables = JSON.parse(saved); return; } catch(e) {} }
  tables = [];
  const perSection = Math.ceil(CLIENT_CONFIG.tableCount / CLIENT_CONFIG.sections.length);
  let id = 1;
  for (const section of CLIENT_CONFIG.sections) {
    for (let i = 0; i < perSection && id <= CLIENT_CONFIG.tableCount; i++, id++) {
      tables.push({
        id, section, status: STATUS.FREE,
        items: [], total: 0, openedAt: null, server: null,
        sentAt: null, billAt: null
      });
    }
  }
}
initTables();

function saveTables() { localStorage.setItem(STORE.tables, JSON.stringify(tables)); }
function getTable(id) { return tables.find(t => t.id === id); }
function recalcTable(t) { t.total = t.items.reduce((s, it) => s + it.price * it.qty, 0); }

// ═══════════════ HELPERS ═══════════════
function f(n) { return Number(n || 0).toFixed(3); }
function now() { return new Date().toLocaleTimeString('fr-TN', { hour:'2-digit', minute:'2-digit' }); }
function nowFull() { return new Date().toLocaleTimeString('fr-TN', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function elapsed(timeStr) {
  if (!timeStr) return '';
  const parts = timeStr.split(':');
  if (parts.length < 2) return '';
  const h = parseInt(parts[0]) || 0;
  const m = parseInt(parts[1]) || 0;
  const nowD = new Date();
  const mins = (nowD.getHours() * 60 + nowD.getMinutes()) - (h * 60 + m);
  if (isNaN(mins) || mins < 0) return '';
  if (mins < 1) return '< 1 min';
  if (mins < 60) return mins + ' min';
  return Math.floor(mins/60) + 'h' + String(mins%60).padStart(2,'0');
}

function pinKey(k) {
  if (k === '✕') { pinBuffer = ''; renderPinDots(); return; }
  if (k === '⌫') { pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); return; }
  pinBuffer += k;
  renderPinDots();
  if (pinBuffer.length === 4) {
    const user = USERS[pinTarget] || EXTRA_USERS.find(u => u.id === pinTarget);
    if (user && user.pin === pinBuffer) {

// ═══════════════ TABLE ACTIONS ═══════════════
function addItem(item) {
  const t = getTable(activeTableId);
  if (!t) return;
  if (t.status === STATUS.FREE) {
    t.status = STATUS.OCCUPIED;
    t.openedAt = now();
    t.server = (USERS[currentUser]||EXTRA_USERS.find(u=>u.id===currentUser)||{}).name || '';
  }
  // Check modifiers for café items
  if (F.modifiers && CLIENT_CONFIG.zone1Cats.includes(currentCat)) {
    showModifiers(item, t);
    return;
  }
  pushItem(t, item, []);
}

function pushItem(t, item, mods, note) {
  const modPrice = (mods||[]).reduce((s,m) => s + (m.price||0), 0);
  const finalPrice = (item.p || 0) + modPrice;
  const modLabels = (mods||[]).map(m => m.label).filter(Boolean);
  // Check if same item + same mods exists
  const existing = t.items.find(x => x.id === item.id && JSON.stringify(x.mods||[]) === JSON.stringify(modLabels));
  if (existing && !note) {
    existing.qty++;
  } else {
    t.items.push({ id: item.id, name: item.name, e: item.e, price: finalPrice, qty: 1, mods: modLabels, note: note||'', zone: item.zone||'bar', sent: false });
  }
  recalcTable(t);
  saveTables();
  render();
}

function changeQty(idx, delta) {
  const t = getTable(activeTableId);
  if (!t) return;
  t.items[idx].qty = Math.max(1, t.items[idx].qty + delta);
  recalcTable(t);
  saveTables();
  render();
}

function removeItem(idx) {
  const t = getTable(activeTableId);
  if (!t) return;
  t.items.splice(idx, 1);
  if (t.items.length === 0) { resetTable(t); }
  recalcTable(t);
  saveTables();
  render();
}

function clearTable() {
  if (!confirm('Vider la table ?')) return;
  const t = getTable(activeTableId);
  if (t) resetTable(t);
  saveTables();
  render();
}

function resetTable(t) {
  t.items = []; t.total = 0; t.status = STATUS.FREE;
  t.openedAt = null; t.server = null; t.sentAt = null; t.billAt = null;
}

function requestBill() {
  const t = getTable(activeTableId);
  if (!t || t.items.length === 0) return;
  t.status = STATUS.BILL;
  t.billAt = now();
  saveTables();
  render();
  flash('📄 Addition demandée — Table ' + t.id);
}

function sendToKitchen() {
  const t = getTable(activeTableId);
  if (!t || t.items.length === 0) return;
  const newItems = t.items.filter(it => !it.sent);
  if (newItems.length === 0) { flash('✓ Tout déjà envoyé'); return; }
  // Mark as sent
  newItems.forEach(it => it.sent = true);
  t.status = STATUS.SENT;
  t.sentAt = now();
  saveTables();
  // Print kitchen tickets
  if (CLIENT_CONFIG.kitchenPrint) printKitchenTickets(t, newItems);
  render();
  flash('🍳 ' + newItems.length + ' article(s) envoyé(s) en cuisine');
}

// ═══════════════ TRANSFER TABLE ═══════════════
function showTransfer() {
  const t = getTable(activeTableId);
  if (!t || t.items.length === 0) return;
  const freeTables = tables.filter(x => x.status === STATUS.FREE && x.id !== t.id);
  showModal(`
    <div class="modal-title">↔️ Transférer Table ${t.id}</div>
    <div class="modal-sub">Vers quelle table ?</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${freeTables.map(x => `<button class="op-btn" style="padding:14px;font-size:13px" onclick="doTransfer(${x.id})">Table ${x.id}</button>`).join('')}
    </div>
    ${freeTables.length===0?'<div style="text-align:center;color:var(--muted);padding:20px">Aucune table libre</div>':''}
    <button class="modal-close" onclick="closeModal()">Annuler</button>
  `);
}

function doTransfer(toId) {
  const from = getTable(activeTableId);
  const to = getTable(toId);
  if (!from || !to) return;
  to.items = [...from.items]; to.total = from.total; to.status = from.status;
  to.openedAt = from.openedAt; to.server = from.server; to.sentAt = from.sentAt;
  resetTable(from);
  activeTableId = toId;
  saveTables(); closeModal(); render();
  flash('↔️ Transféré vers Table ' + toId);
}

// ═══════════════ MERGE TABLES ═══════════════
function showMerge() {
  const t = getTable(activeTableId);
  if (!t) return;
  const occupiedTables = tables.filter(x => x.status !== STATUS.FREE && x.id !== t.id);
  showModal(`
    <div class="modal-title">⊕ Fusionner avec Table ${t.id}</div>
    <div class="modal-sub">Les articles seront ajoutés à cette table</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${occupiedTables.map(x => `<button class="op-btn" style="padding:14px;font-size:13px" onclick="doMerge(${x.id})">Table ${x.id}<br><span style="font-size:10px;color:var(--gold)">${f(x.total)}</span></button>`).join('')}
    </div>
    ${occupiedTables.length===0?'<div style="text-align:center;color:var(--muted);padding:20px">Aucune autre table occupée</div>':''}
    <button class="modal-close" onclick="closeModal()">Annuler</button>
  `);
}

function doMerge(fromId) {
  const to = getTable(activeTableId);
  const from = getTable(fromId);
  if (!to || !from) return;
  to.items = [...to.items, ...from.items];
  recalcTable(to);
  if (to.status === STATUS.FREE) { to.status = STATUS.OCCUPIED; to.openedAt = now(); }
  resetTable(from);
  saveTables(); closeModal(); render();
  flash('⊕ Table ' + fromId + ' fusionnée');
}

  const saleData = {

function splitByPersons() {
  const t = getTable(activeTableId);
  if (!t) return;
  const persons = parseInt(prompt('Nombre de personnes ?'));
  if (!persons || persons < 2) return;
  const perPerson = t.total / persons;
  closeModal();
  flash(`✂️ ${f(perPerson)} ${CLIENT_CONFIG.currency} par personne (${persons} pers.)`);
}

function splitByAmount() {
  const t = getTable(activeTableId);
  if (!t) return;
  const amount = parseFloat(prompt(`Montant à encaisser (total: ${f(t.total)}) ?`));
  if (!amount || amount <= 0 || amount > t.total) return;
  // Partial payment — reduce total
  const remaining = t.total - amount;
  const saleData = {
    num: orderNum++, businessDate: todayKey(), date: new Date().toLocaleDateString('fr-TN'), time: now(),
    items: [{ name: 'Paiement partiel Table ' + t.id, qty: 1, price: amount }],
    s: amount, d: 0, disc: 0, g: amount, payMode: selectedPay||'cash', r: amount, monnaie: 0,
    cashier: (USERS[currentUser]||{}).name||'Caissier', type: 'table', cliName: 'Table '+t.id, cliTel: '',
  };
  if (window.electronAPI?.saveSale) window.electronAPI.saveSale(saleData);
  syncSale(saleData);
  dailyTotal += amount;
  t.total = remaining;
  if (remaining <= 0) { resetTable(t); activeTableId = null; }
  saveTables(); closeModal(); render();
  flash(`✂️ ${f(amount)} encaissé — reste ${f(remaining)}`);
}

function confirmSplitItems() {
  const t = getTable(activeTableId);
  if (!t) return;
  const checked = [];
  t.items.forEach((it, i) => {
    if (document.querySelector(`input[name="split_${i}"]`)?.checked) checked.push(i);
  });
  if (checked.length === 0) return;
  const selectedItems = checked.map(i => t.items[i]);
  const amount = selectedItems.reduce((s,it) => s + it.price*it.qty, 0);
  const saleData = {
    num: orderNum++, businessDate: todayKey(), date: new Date().toLocaleDateString('fr-TN'), time: now(),
    items: selectedItems.map(it => ({ name: it.name, qty: it.qty, price: it.price })),
    s: amount, d: 0, disc: 0, g: amount, payMode: 'cash', r: amount, monnaie: 0,
    cashier: (USERS[currentUser]||{}).name||'Caissier', type: 'table', cliName: 'Table '+t.id, cliTel: '',
  };
  if (window.electronAPI?.saveSale) window.electronAPI.saveSale(saleData);
  syncSale(saleData); dailyTotal += amount;
  // Remove settled items
  t.items = t.items.filter((_, i) => !checked.includes(i));
  recalcTable(t);
  if (t.items.length === 0) { resetTable(t); activeTableId = null; }
  saveTables(); closeModal(); render();
  flash(`✂️ ${f(amount)} encaissé (${checked.length} articles)`);
}

// ═══════════════ SYNC & LICENSE ═══════════════
let syncQueue = JSON.parse(localStorage.getItem(STORE.queue) || '[]');
function saveQueue() { localStorage.setItem(STORE.queue, JSON.stringify(syncQueue)); }

async function syncSale(od) {
  if (!SYNC_ENABLED) return;
  try {
    const res = await fetch(SYNC_API_URL, { method:'POST', headers:{'Content-Type':'application/json','X-Api-Key':SYNC_API_KEY}, body:JSON.stringify(od) });
    const data = await res.json();
    if (data.ok) { flushQueue(); return true; }
  } catch(e) { syncQueue.push(od); saveQueue(); }
  return false;
}

async function flushQueue() {
  if (!syncQueue.length) return;
  const remaining = [];
  for (const od of syncQueue) {
    try {
      const res = await fetch(SYNC_API_URL, { method:'POST', headers:{'Content-Type':'application/json','X-Api-Key':SYNC_API_KEY}, body:JSON.stringify(od) });
      const data = await res.json();
      if (!data.ok) remaining.push(od);
    } catch(e) { remaining.push(od); }
  }
  syncQueue = remaining; saveQueue();
  updateSyncStatus();
}
window.addEventListener('online', () => { flushQueue(); flash('☁ Synchronisation...'); });

function updateSyncStatus() {
  const el = document.getElementById('status-sync');
  if (el) el.textContent = syncQueue.length > 0 ? `⏳ ${syncQueue.length} en attente` : '☁ Synchro OK';
}

// ── License check ──
const CHECK_URL = SYNC_API_URL.replace('/api/sync', '/api/check');
async function checkLicense() {
  if (!SYNC_ENABLED) return;
  try {
    const res = await fetch(CHECK_URL + '?key=' + SYNC_API_KEY, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    if (data.ok && data.active === false) {
      document.getElementById('lock-msg').textContent = data.message || 'Contactez le développeur.';
      document.getElementById('remote-lock').classList.add('active');
      document.getElementById('login').style.display = 'none';
      document.getElementById('hdr').style.display = 'none';
      document.getElementById('main').style.display = 'none';
    }
  } catch(e) { /* offline — don't block */ }
}
setTimeout(checkLicense, 5000);
setInterval(checkLicense, 30 * 60 * 1000);

function flash(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ═══════════════ HYDRATE STATE FROM SQLITE ═══════════════
async function hydrateState() {
  try {
    if (!window.electronAPI?.getSales) return;
    const sales = await window.electronAPI.getSales();
    if (!Array.isArray(sales)) return;
    history = sales.map(s => ({ num:s.num, businessDate:s.businessDate, date:s.date, time:s.time, items:s.items||[], s:s.sub, d:s.discount, disc:s.disc, g:s.grand, payMode:s.payMethod, r:s.received, monnaie:s.monnaie, cashier:s.cashier, type:s.type, cliName:s.cliName||'', cliTel:'' }));
    const todaySales = history.filter(s => s.businessDate === todayKey());
    dailyTotal = todaySales.reduce((s,x) => s + (x.g||0), 0);
    orderNum = todaySales.length ? Math.max(...todaySales.map(s => s.num||0)) + 1 : 1;
  } catch(e) { console.warn('Hydrate failed:', e); }
}
hydrateState();

// ═══════════════ CLÔTURE DE CAISSE ═══════════════
function showCloseCaisse() {
  if (!currentSession) return;
  const todaySales = history.filter(s => s.businessDate === todayKey());
  const totalSales = todaySales.reduce((s,x) => s + (x.g||0), 0);
  const cashSales = todaySales.filter(s => s.payMode === 'cash').reduce((s,x) => s + (x.g||0), 0);
  const cardSales = todaySales.filter(s => s.payMode === 'card').reduce((s,x) => s + (x.g||0), 0);
  const mobSales = todaySales.filter(s => s.payMode === 'mob').reduce((s,x) => s + (x.g||0), 0);
  const theorique = currentSession.fondInitial + cashSales;

  showModal(`
    <div class="modal-title">🔒 Clôture de Caisse</div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:14px">${currentSession.cashier} · Ouvert à ${currentSession.openedAt}</div>
    <div style="background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">Fond initial</span><span>${f(currentSession.fondInitial)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">Ventes total</span><span style="color:var(--gold-l);font-weight:700">${f(totalSales)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">💵 Espèces</span><span>${f(cashSales)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">💳 Carte</span><span>${f(cardSales)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">📱 Mobile</span><span>${f(mobSales)}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:12px"><span style="color:var(--muted)">Commandes</span><span>${todaySales.length}</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;font-weight:700"><span>Théorique en caisse</span><span style="color:var(--green)">${f(theorique)}</span></div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Montant compté en caisse (DT)</label>
      <input id="cloture-montant" type="number" step="0.5" placeholder="0.000" style="width:100%;background:var(--card);border:1px solid var(--div);border-radius:8px;padding:12px;color:var(--txt);font-size:18px;font-weight:700;text-align:center;outline:none" autocomplete="off">
    </div>
    <button onclick="confirmCloseCaisse(${totalSales},${cashSales},${cardSales},${mobSales},${todaySales.length},${theorique})" style="width:100%;padding:13px;background:linear-gradient(135deg,var(--red),#c44);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔒 Confirmer la clôture</button>
    <button class="modal-close" onclick="closeModal()">Annuler</button>
  `);
  setTimeout(() => document.getElementById('cloture-montant')?.focus(), 100);
}

function confirmCloseCaisse(totalSales, cashSales, cardSales, mobSales, ordersCount, theorique) {
  const montant = parseFloat(document.getElementById('cloture-montant')?.value) || 0;
  const ecart = montant - theorique;

  const clotureData = {
    businessDate: todayKey(),
    cashier: currentSession.cashier,
    fondInitial: currentSession.fondInitial,
    totalSales, cashSales, cardSales, mobSales, ordersCount,
    montantCompte: montant, theorique, ecart,
    closedAt: now(),
  };

  // Save locally
  if (window.electronAPI?.closeSession) window.electronAPI.closeSession(currentSession.id, clotureData);

  // Sync clôture to server
  syncCloture(clotureData);

  // Clear session
  currentSession = null;
  saveSession();
  closeModal();
  render();
  flash(`🔒 Caisse clôturée — Écart: ${ecart >= 0 ? '+' : ''}${f(ecart)} ${CLIENT_CONFIG.currency}`);
}

async function syncCloture(data) {
  if (!SYNC_ENABLED) return;
  const url = SYNC_API_URL.replace('/api/sync', '/api/cloture');
  try {
    await fetch(url, { method:'POST', headers:{'Content-Type':'application/json','X-Api-Key':SYNC_API_KEY}, body:JSON.stringify(data) });
  } catch(e) { /* queue for later if needed */ }
}

// ═══════════════ MENU MANAGEMENT (Manager) ═══════════════
function showMenuManage() {
  const user = USERS[currentUser] || {};
  if (!user.isManager) { flash('🔒 Accès réservé au Manager'); return; }
  const cats = Object.keys(MENU);
  let selectedCat = cats[0] || '';

  function renderMenuModal() {
    const items = MENU[selectedCat]?.items || [];
    showModal(`
      <div class="modal-title">🛠️ Gérer le Menu</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${cats.map(c => `<button class="cat-chip${c===selectedCat?' on':''}" onclick="mmSelectCat('${c}')">${MENU[c].icon} ${c}</button>`).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <input id="mm-new-cat" placeholder="Nouvelle catégorie" style="flex:1;background:var(--card);border:1px solid var(--div);border-radius:6px;padding:8px;color:var(--txt);font-size:12px;outline:none">
        <input id="mm-new-cat-icon" placeholder="🍽️" style="width:40px;background:var(--card);border:1px solid var(--div);border-radius:6px;padding:8px;color:var(--txt);font-size:14px;text-align:center;outline:none">
        <button class="op-btn" style="padding:8px 12px" onclick="mmAddCat()">+ Cat</button>
      </div>
      <div style="max-height:200px;overflow-y:auto;margin-bottom:12px">
        ${items.length===0?'<div style="text-align:center;color:var(--muted);padding:16px">Aucun article</div>':''}
        ${items.map((it,i) => `
          <div style="display:flex;align-items:center;gap:6px;padding:6px 4px;border-bottom:1px solid var(--div)">
            <span style="font-size:16px;width:24px">${it.e}</span>
            <span style="flex:1;font-size:12px">${it.name}</span>
            <input type="number" step="0.5" value="${it.p||0}" onchange="mmUpdatePrice('${selectedCat}',${i},this.value)" style="width:60px;background:var(--card);border:1px solid var(--div);border-radius:4px;padding:4px;color:var(--gold-l);font-size:12px;font-weight:700;text-align:right;outline:none">
            <button class="oi-del" onclick="mmDeleteItem('${selectedCat}',${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <div style="border-top:1px solid var(--div);padding-top:12px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">AJOUTER UN ARTICLE</div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <input id="mm-new-emoji" placeholder="🍕" style="width:40px;background:var(--card);border:1px solid var(--div);border-radius:6px;padding:8px;color:var(--txt);font-size:14px;text-align:center;outline:none">
          <input id="mm-new-name" placeholder="Nom article" style="flex:1;background:var(--card);border:1px solid var(--div);border-radius:6px;padding:8px;color:var(--txt);font-size:12px;outline:none">
          <input id="mm-new-price" type="number" step="0.5" placeholder="Prix" style="width:60px;background:var(--card);border:1px solid var(--div);border-radius:6px;padding:8px;color:var(--txt);font-size:12px;outline:none">
        </div>
        <button class="pay-btn pay-btn-green" style="width:100%;padding:10px" onclick="mmAddItem('${selectedCat}')">+ Ajouter</button>
      </div>
      <button class="modal-close" onclick="closeModal()">Fermer</button>
    `, 'menu-manage');
  }

  // Expose functions globally for modal buttons
  window.mmSelectCat = function(c) { selectedCat = c; renderMenuModal(); };
  window.mmAddCat = function() {
    const name = document.getElementById('mm-new-cat')?.value.trim();
    const icon = document.getElementById('mm-new-cat-icon')?.value.trim() || '🍽️';
    if (!name) return;
    if (MENU[name]) { flash('Catégorie existe déjà'); return; }
    MENU[name] = { icon, items: [] };
    cats.push(name);
    selectedCat = name;
    saveMenuToStorage();
    renderMenuModal();
    flash('✓ Catégorie "' + name + '" créée');
  };
  window.mmDeleteItem = function(cat, idx) {
    MENU[cat].items.splice(idx, 1);
    saveMenuToStorage();
    renderMenuModal();
  };
  window.mmUpdatePrice = function(cat, idx, val) {
    MENU[cat].items[idx].p = parseFloat(val) || 0;
    saveMenuToStorage();
  };
  window.mmAddItem = function(cat) {
    const emoji = document.getElementById('mm-new-emoji')?.value.trim() || '🍽️';
    const name = document.getElementById('mm-new-name')?.value.trim();
    const price = parseFloat(document.getElementById('mm-new-price')?.value) || 0;
    if (!name) { flash('Nom requis'); return; }
    const id = cat.slice(0,2).toLowerCase() + (MENU[cat].items.length + 1);
    MENU[cat].items.push({ id, name, e: emoji, p: price, zone: CLIENT_CONFIG.zone1Cats.includes(cat) ? 'bar' : 'cuisine' });
    saveMenuToStorage();
    renderMenuModal();
    flash('✓ "' + name + '" ajouté');
  };

  renderMenuModal();
}

const MENU_STORE_KEY = 'servio-cafe-menu-v1';
function saveMenuToStorage() { localStorage.setItem(MENU_STORE_KEY, JSON.stringify(MENU)); }
function loadMenuFromStorage() {
  try {
    const raw = localStorage.getItem(MENU_STORE_KEY);
    if (raw) { const m = JSON.parse(raw); if (m && Object.keys(m).length) MENU = m; }
  } catch(e) {}
}
loadMenuFromStorage();

// ═══════════════ START ═══════════════
try { render(); } catch(e) { document.body.innerHTML = '<pre style="color:red;padding:20px">ERREUR: ' + e.message + '\n' + e.stack + '</pre>'; }

</script>
</body>
